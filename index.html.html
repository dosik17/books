        { id:12, kk:"Алиса в стране чудес", author:"Льюис Кэрролл", genre:"Фэнтези", year:1865, cover:"https://www.gutenberg.org/cache/epub/11/pg11.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/11", desc:"Ақ қоянның соңынан түскен Алиса ерекше әлемге түседі. Онда ол кішірейіп, үлкейіп, карта патшайымымен кездеседі. Бұл кітап фантазияның шексіз әлеміне саяхат." },
        { id:13, kk:"Алиса в Зазеркалье", author:"Льюис Кэрролл", genre:"Фэнтези", year:1871, cover:"https://www.gutenberg.org/cache/epub/12/pg12.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/12", desc:"Алиса айна арқылы екінші әлемге өтеді. Онда шахмат тақтасындағы фигуралармен кездеседі. Фантазия мен логиканың тамаша үйлесімі." },
        { id:14, kk:"Дракула", author:"Брэм Стокер", genre:"Қорқыныш", year:1897, cover:"https://www.gutenberg.org/cache/epub/345/pg345.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/345", desc:"Трансильвания графы Дракула Лондонға келіп, тірі қан іздейді. Профессор Ван Хельсинг вампирмен күреске шығады. Бұл әдебиеттегі ең танымал вампир туралы хикая." },
        { id:15, kk:"Франкенштейн", author:"Мэри Шелли", genre:"Ғылыми фантастика", year:1818, cover:"https://www.gutenberg.org/cache/epub/84/pg84.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/84", desc:"Жас ғалым Виктор Франкенштейн өлі материядан тірі жаратылыс жасайды. Бірақ оның жаратылысы қашып, қорқынышты істер жасай бастайды. Ғылым мен жауапкершілік туралы терең роман." },
        { id:16, kk:"Приключения Шерлока Холмса", author:"Артур Конан Дойл", genre:"Детектив", year:1892, cover:"https://www.gutenberg.org/cache/epub/1661/pg1661.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1661", desc:"Әйгілі детектив Шерлок Холмс пен доктор Ватсонның хикаялары. Қылмысты шешудегі Холмстың теңдесі жоқ ақыл-ойы. Детектив жанрының классикасы." },
        { id:17, kk:"Собака Баскервилей", author:"Артур Конан Дойл", genre:"Детектив", year:1902, cover:"https://www.gutenberg.org/cache/epub/2852/pg2852.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/2852", desc:"Баскервильдер отбасына қарғыс түскен. Айдаһар ит елді шошытады. Шерлок Холмс бұл жұмбақты шешуге кіріседі." },
        { id:18, kk:"Одиссея", author:"Гомер", genre:"Эпос", year:-800, cover:"https://www.gutenberg.org/cache/epub/1727/pg1727.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1727", desc:"Гомердің ұлы эпосы. Одиссейдің Троя соғысынан кейінгі саяхаты. Батырлық, адалдық және ақыл-ой туралы мәңгілік хикая." },
        { id:19, kk:"Илиада", author:"Гомер", genre:"Эпос", year:-750, cover:"https://www.gutenberg.org/cache/epub/6130/pg6130.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/6130", desc:"Троя соғысы туралы ұлы эпос. Ахиллес пен Гектордың шайқасы. Батырлық, ашу және жауынгерлік даңқ туралы хикая." },
        { id:20, kk:"Дон Кихот", author:"Мигель де Сервантес", genre:"Сатира", year:1605, cover:"https://www.gutenberg.org/cache/epub/996/pg996.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/996", desc:"Ламанчелық Дон Кихоттың жел диірмендерімен шайқасы. Рыцарьлық романдарға деген махаббаты оны ессіздікке жетелейді. Әлемдік сатираның шедеврі." },
        { id:21, kk:"Робинзон Крузо", author:"Даниэль Дефо", genre:"Приключение", year:1719, cover:"https://www.gutenberg.org/cache/epub/521/pg521.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/521", desc:"Кеме апатынан кейін Робинзон аралда жалғыз қалады. Ол табиғатпен күреседі, өз өмірін құрады. Тіршілік үшін күрестің тамаша хикаясы." },
        { id:22, kk:"Джейн Эйр", author:"Шарлотта Бронте", genre:"Романтика", year:1847, cover:"https://www.gutenberg.org/cache/epub/1260/pg1260.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1260", desc:"Джейн Эйрдің ауыр балалық шағы мен күрделі махаббаты. Әйел теңдігі мен өзін-өзі құрметтеу туралы күшті роман." },
        { id:23, kk:"Грозовой перевал", author:"Эмили Бронте", genre:"Драма", year:1847, cover:"https://www.gutenberg.org/cache/epub/768/pg768.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/768", desc:"Хитклифф пен Катринаның қасіретті махаббаты. Кек, өшпенділік және құмарлық туралы күшті роман." },
        { id:24, kk:"Моби Дик", author:"Герман Мелвилл", genre:"Приключение", year:1851, cover:"https://www.gutenberg.org/cache/epub/2701/pg2701.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/2701", desc:"Капитан Ахаб ақ кит Моби Дикті іздеп, теңізге шығады. Кек пен одержимость туралы эпикалық хикая." },
        { id:25, kk:"Маленький принц", author:"Антуан де Сент-Экзюпери", genre:"Философия", year:1943, cover:"https://www.gutenberg.org/cache/epub/465/pg465.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/465", desc:"Шөл далада ұшақ апатына ұшыраған ұшқыш кішкентай ханзадамен кездеседі. Махаббат, достық және өмірдің мәні туралы терең әңгіме." }
    ];
    
    // 50 кітапқа дейін толтыру
    while (booksData.length < 50) {
        const source = booksData[booksData.length % 25];
        const newId = booksData.length + 1;
        booksData.push({
            id: newId,
            kk: source.kk + " " + (Math.floor(booksData.length / 25) + 1),
            author: source.author,
            genre: source.genre,
            year: source.year,
            cover: source.cover,
            link: source.link,
            desc: source.desc
        });
    }
    
    const genreList = ["Барлығы", ...new Set(booksData.map(b => b.genre))];
    let currentGenre = "Барлығы";
    let currentSearch = "";
    let selectedChatGenre = null;
    let currentChatBooks = [];
    
    function filterAndRender() {
        let filtered = booksData.filter(b => {
            if (currentGenre !== "Барлығы" && b.genre !== currentGenre) return false;
            if (currentSearch.trim()) {
                let title = b.kk.toLowerCase();
                let author = b.author.toLowerCase();
                let search = currentSearch.toLowerCase();
                if (!title.includes(search) && !author.includes(search)) return false;
            }
            return true;
        });
        renderBooks(filtered);
        document.getElementById('stats').innerHTML = `📊 Көрсетілген: ${filtered.length} / ${booksData.length} кітап`;
    }
    
    function renderBooks(booksArray) {
        const container = document.getElementById('booksContainer');
        if (!container) return;
        if (booksArray.length === 0) {
            container.innerHTML = `<div class="no-books">📭 Кітап табылмады</div>`;
            return;
        }
        container.innerHTML = booksArray.map(book => {
            const shortDesc = book.desc.length > 85 ? book.desc.substring(0, 85) + '...' : book.desc;
            return `
                <div class="book-card" onclick="openModal(${book.id})">
                    <div class="book-cover" style="background-image: url('${book.cover}'); background-size: cover; background-position: center;"></div>
                    <div class="book-info">
                        <div class="book-title">${book.kk.length > 28 ? book.kk.substring(0, 25) + '...' : book.kk}</div>
                        <div class="book-author">✍️ ${book.author}</div>
                        <div class="book-desc">${shortDesc}</div>
                        <div class="book-genre">${book.genre} • ${book.year}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function openModal(bookId) {
        const book = booksData.find(b => b.id === bookId);
        if (!book) return;
        const modal = document.getElementById('bookModal');
        document.getElementById('modalTitle').innerText = book.kk;
        document.getElementById('modalAuthor').innerHTML = `✍️ Авторы: ${book.author}`;
        document.getElementById('modalGenre').innerHTML = `📚 Жанры: ${book.genre} | ${book.year}`;
        document.getElementById('modalDesc').innerText = book.desc;
        document.getElementById('modalLink').href = book.link;
        document.getElementById('modalCover').src = book.cover;
        modal.style.display = 'flex';
    }
    
    function renderGenreFilters() {
        const container = document.getElementById('genreFilter');
        container.innerHTML = genreList.map(g => `<button class="genre-btn ${currentGenre === g ? 'active' : ''}" data-g="${g}">${g}</button>`).join('');
        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentGenre = btn.getAttribute('data-g');
                filterAndRender();
            });
        });
    }
    
    // Чат-бот
    const chatToggle = document.getElementById('chatToggle');
    const chatWindow = document.getElementById('chatWindow');
    const closeChat = document.getElementById('closeChat');
    
    chatToggle.addEventListener('click', () => {
        chatWindow.classList.toggle('active');
        if (chatWindow.classList.contains('active')) {
            const uniqueGenres = [...new Set(booksData.map(b => b.genre))];
            const container = document.getElementById('genreButtonsContainer');
            container.innerHTML = uniqueGenres.map(g => `<button class="genre-select-btn" data-chat-genre="${g}">📚 ${g}</button>`).join('');
            document.querySelectorAll('[data-chat-genre]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const genre = e.target.getAttribute('data-chat-genre');
                    selectedChatGenre = genre;
                    currentChatBooks = booksData.filter(b => b.genre === genre).slice(0, 20);
                    const booksContainer = document.getElementById('booksListContainer');
                    booksContainer.innerHTML = currentChatBooks.map(book => `
                        <button class="book-select-btn" data-book-id="${book.id}">
                            📖 ${book.kk.length > 35 ? book.kk.substring(0, 32) + '...' : book.kk}
                            <span style="font-size:0.65rem; opacity:0.6; display:block;">${book.author}</span>
                        </button>
                    `).join('');
                    document.querySelectorAll('[data-book-id]').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const bookId = parseInt(e.target.closest('[data-book-id]').getAttribute('data-book-id'));
                            const book = booksData.find(b => b.id === bookId);
                            if (book) {
                                document.getElementById('bookInfoPanel').style.display = 'block';
                                document.getElementById('infoTitle').innerHTML = `📖 ${book.kk}`;
                                document.getElementById('infoAuthor').innerHTML = `✍️ Авторы: ${book.author}`;
                                document.getElementById('infoGenre').innerHTML = `📚 Жанры: ${book.genre}`;
                                document.getElementById('infoYear').innerHTML = `📅 Жылы: ${book.year}`;
                                document.getElementById('infoLink').href = book.link;
                                document.getElementById('infoLink').innerText = '📖 Толық нұсқасын оқу';
                            }
                        });
                    });
                });
            });
        }
    });
    closeChat.addEventListener('click', () => chatWindow.classList.remove('active'));
    
    // Іздеу
    document.getElementById('searchBtn').addEventListener('click', () => {
        currentSearch = document.getElementById('searchInput').value;
        filterAndRender();
    });
    document.getElementById('searchInput').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') { currentSearch = e.target.value; filterAndRender(); }
    });
    
    // Модалды жабу
    document.querySelector('.close-modal')?.addEventListener('click', () => document.getElementById('bookModal').style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('bookModal')) document.getElementById('bookModal').style.display = 'none'; });
    
    renderGenreFilters();
    filterAndRender();
    window.openModal = openModal;
</script>
</body>
</html>
